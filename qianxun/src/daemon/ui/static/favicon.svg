<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 千寻 favicon — 圆眼 + sparkle ✨
       寓意: "众里寻他千百度" (寻找) + "众得所见" (展示)
       - 紫圆 (千寻主色 #6366f1): 万千世界
       - 白虹膜 + 深瞳孔: 寻找的眼睛
       - 暖色光点 + sparkle ✨: 找到的那颗星 (众得所见)
       圆 + 暖光 = 亲切 + 寻得  -->
  <circle cx="16" cy="16" r="15" fill="#6366f1"/>
  <circle cx="16" cy="16" r="11" fill="#f5f3ff"/>
  <circle cx="16" cy="16" r="7" fill="#312e81"/>
  <circle cx="13" cy="13" r="2.2" fill="#fbbf24"/>
  <path d="M 25 8 L 26 10.5 L 28.5 11.5 L 26 12.5 L 25 15 L 24 12.5 L 21.5 11.5 L 24 10.5 Z" fill="#fde68a"/>
