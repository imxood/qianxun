<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>千寻 VPS · 登录</title>
  <style>
    :root {
      --bg: #0e0f12;
      --panel: #1a1c22;
      --border: #2a2d35;
      --text: #e6e8eb;
      --text-dim: #8a8f9a;
      --accent: #ff7a3d;       /* 千寻品牌色 (橙) */
      --accent-hover: #ff8f5a;
      --error: #ff5b5b;
      --ok: #4ade80;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei",
                   "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    .wrap {
      min-height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 380px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
    }
    .brand-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #1a1c22; font-weight: 700; font-size: 18px;
    }
    .brand-name {
      font-size: 18px; font-weight: 600; letter-spacing: 0.5px;
    }
    .brand-sub {
      color: var(--text-dim); font-size: 12px;
    }
    h1 {
      font-size: 20px; font-weight: 600;
      margin: 0 0 6px 0;
    }
    .subtitle {
      color: var(--text-dim); font-size: 13px;
      margin-bottom: 24px;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block; margin-bottom: 6px;
      color: var(--text-dim); font-size: 12px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #0e0f12;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: var(--accent);
      color: #1a1c22;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.error { background: rgba(255, 91, 91, 0.12); color: var(--error); }
    .msg.ok    { background: rgba(74, 222, 128, 0.12); color: var(--ok); }
    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="brand-mark">千</div>
        <div>
          <div class="brand-name">千寻 VPS</div>
          <div class="brand-sub">qianxun · vps control plane</div>
        </div>
      </div>

      <h1>登录</h1>
      <div class="subtitle">使用账号密码继续</div>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="username">用户名 / 邮箱</label>
          <input type="text" id="username" name="username"
                 required autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input type="password" id="password" name="password"
                 required autocomplete="current-password" />
        </div>
        <button type="submit" id="submitBtn">登录</button>
      </form>

      <div id="msg" class="msg"></div>

      <div class="footer">
        Stage 5 起步 · 完整 Web UI (聊天/团队/项目管理) 见 Stage 6
      </div>
    </div>
  </div>

  <script src="/ui/login.js"></script>
</body>
</html>
