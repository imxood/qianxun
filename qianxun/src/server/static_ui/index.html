<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>千寻 VPS · 控制台</title>
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <!-- 登录页 (默认) -->
  <section id="login" class="screen active">
    <div class="login-wrap">
      <div class="login-card">
        <div class="brand">
          <div class="brand-mark">千</div>
          <div>
            <div class="brand-name">千寻 VPS</div>
            <div class="brand-sub">qianxun · vps control plane</div>
          </div>
        </div>

        <h1>登录</h1>
        <div class="subtitle">使用账号密码继续</div>

        <form id="loginForm" autocomplete="off">
          <div class="field">
            <label for="username">用户名 / 邮箱</label>
            <input type="text" id="username" name="username"
                   required autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input type="password" id="password" name="password"
                   required autocomplete="current-password" />
          </div>
          <button type="submit" id="submitBtn">登录</button>
        </form>

        <div id="msg" class="msg"></div>

        <div style="margin-top:24px; padding-top:16px; border-top:1px solid var(--border);
                    color:var(--text-dim); font-size:11px; text-align:center;">
          Stage 6c · 完整 Web UI (项目 / 会话 / 聊天)
        </div>
      </div>
    </div>
  </section>

  <!-- App (3 栏: 项目 / 会话 / 聊天) -->
  <section id="app" class="screen app">
    <aside id="sidebar">
      <div class="col-header">
        <h2>项目</h2>
        <button class="ghost" id="logoutBtn" title="登出">登出</button>
      </div>
      <div id="projectList" class="list">
        <div class="list-empty">加载中…</div>
      </div>
    </aside>

    <aside id="sessions">
      <div class="col-header">
        <h2 id="sessionsTitle">会话</h2>
        <button id="newSessionBtn">+ 新建</button>
      </div>
      <div id="sessionList" class="list">
        <div class="list-empty">先选一个项目</div>
      </div>
    </aside>

    <main id="chat">
      <div class="chat-header">
        <div>
          <div class="chat-title" id="chatTitle">未选择会话</div>
          <div class="chat-meta" id="chatMeta"></div>
        </div>
        <div class="chat-settings">
          <label for="daemonUrl">Daemon:</label>
          <input type="text" id="daemonUrl" placeholder="http://127.0.0.1:23900" />
        </div>
      </div>
      <div id="messages" class="messages">
        <div class="msg-bubble system">登录成功 — 从左侧选一个项目开始</div>
      </div>
      <div class="composer">
        <textarea id="composer" rows="1"
                  placeholder="输入消息, Enter 发送 / Shift+Enter 换行"></textarea>
        <button id="sendBtn">发送</button>
      </div>
    </main>
  </section>

  <script src="/ui/login.js"></script>
  <script src="/ui/app.js"></script>
</body>
</html>
