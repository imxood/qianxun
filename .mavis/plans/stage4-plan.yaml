      ## 实施内容 (Stage 4 最小集, 30 分钟内)

      ### 1. 新建 `qianxun/src/client/mod.rs` (~150 行)

      跨 binary 共享的 thin client (HTTP + SSE):
      ```rust
      use std::time::Duration;

      pub struct DaemonClient {
          base_url: String,        // http://127.0.0.1:23900
          http: reqwest::Client,
      }

      impl DaemonClient {
          pub fn new(base_url: String) -> Self;

          /// 健康检查, 3s 超时
          pub async fn health(&self) -> Result<HealthStatus, ClientError>;

          /// 创建 session
          pub async fn create_session(&self) -> Result<String, ClientError>;

          /// 列出 sessions
          pub async fn list_sessions(&self) -> Result<Vec<Session>, ClientError>;

          /// Prompt 走 SSE 流, 返回 BoxStream<LlmStreamEvent>
          pub async fn stream_prompt(
              &self, session_id: &str, messages: Vec<ContentBlock>,
          ) -> Result<BoxStream<'static, Result<LlmStreamEvent, ClientError>>, ClientError>;
      }
      ```

      SSE 解析用 `reqwest` 的 `bytes_stream()` + 自己写 SSE parser (类似 `provider/anthropic_compat.rs::SseParser`, 但更简单, 只解析 data: 行, 不分 event 类型 — 12 种类型全在一个流上)。

      ### 2. 改 `qianxun/src/main.rs`

      加 `--standalone` flag (默认 false):
      ```rust
      #[arg(long)]
      standalone: bool,  // true = 用本地 AgentLoop, false (默认) = 走 daemon
      ```

      CLI REPL 入口:
      - `--standalone` 或 `--daemon-url <url>` 显式: 走 thin client
      - 默认: 探测 `http://127.0.0.1:23900/v1/system/health`, 3s 内 daemon up → thin client, 否则 standalone (兼容旧行为)

      ### 3. 改 `qianxun/src/tui/mod.rs`

      - 加 `mode: ThinClientMode` enum (Standalone / ThinClient(DaemonClient))
      - `new()` 接受 mode 参数
      - 如果 ThinClient, prompt 不调 processing_loop, 改调 `client.stream_prompt()` 收 SSE 流
      - 保留 Standalone 路径完全不变 (向后兼容)

      ### 4. 改 `qianxun/src/acp/server.rs` (或 main.rs)

      - 同上: thin client 路径调 DaemonClient
      - 保留 standalone 路径

      ### 5. 单测 `qianxun/src/client/mod.rs` 末尾

      - `test_health_returns_health_status`: 用 mock HTTP server 返 JSON, client.health() 解析
      - `test_create_session_returns_session_id`: 同上
      - `test_stream_prompt_parses_sse_events`: mock server 返 SSE 流, client.stream_prompt 解析出 12 种 event (mock 几个关键的: message_start / text_delta / message_stop)

      ## 关键约束

      - **保留 Standalone 路径完全不变** (向后兼容, `--standalone` flag 或 daemon down 时)
      - **不修改 Daemon 端 (server/)** (Stage 3 已完)
      - **不接自动重连** (Stage 5 才是, Stage 4 简化: daemon 挂了让用户重启)
      - **不接认证 / token** (Stage 5 才是)
      - **不引入新 crate** (reqwest / tokio 已有)
      - **不修改 shared-contract**

