      ## 实施内容 (Stage 4 最小集, 30 分钟内)

      ### 1. 新建 `qianxun/Dockerfile` (~30 行, 多阶段构建)

      ```dockerfile
      # Stage 1: builder
      FROM rust:1.85-slim AS builder
      WORKDIR /app
      COPY Cargo.lock Cargo.toml ./
      COPY qianxun-core/ ./qianxun-core/
      COPY qianxun-memory/ ./qianxun-memory/
      COPY qianxun/ ./qianxun/
      RUN apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev && \
          cargo build --release --bin qx

      # Stage 2: runtime
      FROM debian:bookworm-slim
      RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates && \
          rm -rf /var/lib/apt/lists/*
      RUN useradd -m -u 1000 qxvps
      USER qxvps
      WORKDIR /home/qxvps
      COPY --from=builder /app/target/release/qx /usr/local/bin/qx
      EXPOSE 23901
      VOLUME ["/home/qxvps/.qxvps"]
      ENTRYPOINT ["/usr/local/bin/qx", "--server", "--port", "23901"]
      ```

      ### 2. 新建 `qianxun/.dockerignore`

      标准忽略 (`target/` / `node_modules/` / `.git/` / `**/target/` 等).

      ### 3. 新建 `docker-compose.yml` (项目根)

      ```yaml
      services:
        qxvps:
          build: ./qianxun
          image: qxvps:stage4
          container_name: qxvps
          restart: unless-stopped
          ports:
            - "23901:23901"
          volumes:
            - qxvps-data:/home/qxvps/.qxvps
          environment:
            - QXVPS_LOG_LEVEL=info
          deploy:
            resources:
              limits:
                cpus: '1.0'
                memory: 512M
      volumes:
        qxvps-data:
      ```

      ### 4. 新建 `qianxun/src/server/admin.rs` (~80 行)

      Admin auth guard:
      ```rust
      /// Stage 4 简化: admin auth = JWT 中 role 字段是 "admin" 或 "owner".
      /// 从 Authorization header 提取 JWT, 解析 claims, 检查 role.
      pub fn require_admin(headers: &axum::http::HeaderMap) -> Result<String, AdminError>;

      pub enum AdminError {
          Missing,
          Invalid,
          Forbidden,  // 角色不够
      }
      ```

      复用 Stage 1 `qianxun/src/server/auth.rs::Claims` 结构.

      ### 5. 改 `qianxun/src/server/mod.rs`

      7 个 admin endpoint 加 auth guard:
      - POST /api/admin/users (Stage 1 已有) → 加 admin guard
      - GET /api/admin/users → 加 admin guard
      - 新增 5 个:
        * `GET /api/admin/teams` → 列出所有 teams (admin only)
        * `POST /api/admin/teams/:id/members { user_id, role }` → 添加成员
        * `DELETE /api/admin/teams/:id/members/:user_id` → 移除成员
        * `GET /api/admin/projects` → 列出所有 team_projects
        * `DELETE /api/admin/projects/:id` → 归档 (软删, archived=1)

      ### 6. 改 `qianxun/src/server/ws_hub.rs`

      加 RBAC 检查 helper:
      ```rust
      /// 检查 user 是否在 team 中, 且 project 已分配给 user.
      /// Stage 4 简化: 同步查 TeamDb (无缓存).
      pub async fn check_rbac(
          team_db: &TeamDb, user_id: &str, project_id: &str,
      ) -> Result<bool, RbacError>;
      ```

      在 `handle_prompt_frame` 路由时 (mod.rs 里), 调 `check_rbac(...)` 验证 user 对 target_project 有访问权. 不通过 → 推 `event_error` 帧 code="forbidden".

      ### 7. 单测

      - `qianxun/src/server/admin.rs` 末尾 2 单测: 合法 admin JWT → Ok, 普通 user → Err(Forbidden)
      - `qianxun/src/server/ws_hub.rs` 末尾 1 单测: check_rbac user 在 team 且 project assigned → Ok(true), 未分配 → Ok(false)

      ## 关键约束

