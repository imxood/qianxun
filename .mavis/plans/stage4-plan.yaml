      ### 2. 改 `qianxun-desktop/src/lib/stores/session.svelte.ts` — 加 offlineQueue

      ```typescript
      interface OfflineMessage {
          id: string;  // crypto.randomUUID()
          sessionId: string;
          text: string;
          createdAt: string;
          attempts: number;
      }

      class SessionStore {
          private offlineQueue = $state<OfflineMessage[]>([]);

          get offlineQueueSize() { return this.offlineQueue.length; }

          /// send() 时, 如果 isDegraded, 推入 offlineQueue 而不发 prompt
          async send(text: string, model: string): Promise<void> {
              if (connectionStore.isDegraded) {
                  this.offlineQueue.push({
                      id: crypto.randomUUID(),
                      sessionId: this.runtime?.sessionId ?? '',
                      text,
                      createdAt: new Date().toISOString(),
                      attempts: 0,
                  });
                  this.persistOfflineQueue();
                  toast.info('消息已加入队列, 重连后自动发送');
                  return;
              }
              // ... 原有 send 流程
          }

          /// daemon reconnect 后自动 flush
          private async flushOfflineQueue(): Promise<void> {
              const queue = [...this.offlineQueue];
              this.offlineQueue = [];
              for (const msg of queue) {
                  await this.send(msg.text, this.runtime?.model ?? 'MiniMax-M3');
              }
          }

          private persistOfflineQueue(): void {
              localStorage.setItem('qianxun-offline-queue', JSON.stringify(this.offlineQueue));
          }

          private loadOfflineQueue(): void {
              const raw = localStorage.getItem('qianxun-offline-queue');
              if (raw) this.offlineQueue = JSON.parse(raw);
          }
      }
      ```

