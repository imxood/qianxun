      ```typescript
      // index.ts
      import { writable, type Writable } from 'svelte/store';

      type Locale = 'zh-CN' | 'en';
      const messages = { 'zh-CN': zhCN, 'en': en };
      export const currentLocale: Writable<Locale> = writable('zh-CN');
      export function t(key: keyof typeof zhCN): string {
          let loc: Locale = 'zh-CN';
          currentLocale.subscribe(l => loc = l)();
          return messages[loc][key] ?? key;
      }
      ```

