      ## 实施 (30 min 严格上限)

      ### 1. 改 `qianxun-desktop/src/lib/stores/vps.svelte.ts` — 3 方法真接 fetch

      ```typescript
      /// 通用 fetch wrapper, 自动带 Bearer token
      async function vpsFetch(path: string, opts: RequestInit = {}): Promise<Response> {
          const token = localStorage.getItem('qxvps_token') ?? '';
          return fetch(`${settingsStore.vpsUrl}${path}`, {
              ...opts,
              headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json',
                  ...(opts.headers ?? {}),
              },
          });
      }

      class VpsStore {
          async inviteMember(teamId: string, userId: string, role: string): Promise<void> {
              const r = await vpsFetch(`/api/teams/${teamId}/members`, {
                  method: 'POST', body: JSON.stringify({ user_id: userId, role }),
              });
              if (!r.ok) throw new Error(`inviteMember failed: ${r.status}`);
              this.refreshMembers(teamId);
          }
          // changeRole / assignProject 类似
      }
      ```

      ### 2. 改 `qianxun-desktop/src/lib/components/layout/Sidebar.svelte` — 完整路由

      ```svelte
