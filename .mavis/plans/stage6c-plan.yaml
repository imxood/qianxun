  - id: daemon-stage6c-token-integration
    title: 'Daemon Stage 6c: 客户端 token 集成 (main.rs + TUI/ACP 走 thin client 带 token)'
    assigned_to: coder
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      你的任务: 让 main.rs 的 CLI REPL / TUI / ACP 三个 binary 在连 daemon 时自动用 `--client-token` flag 注入 token, 调 DaemonClient::with_token 而非 new.

      ## 必读
      - `qianxun/src/main.rs` (clap 入口 + CLI REPL 分支)
      - `qianxun/src/tui/mod.rs` (Stage 1-4, 当前是 standalone mode)
      - `qianxun/src/acp/server.rs` (Stage 1-4)
      - `qianxun/src/client/mod.rs` (Stage 4 DaemonClient + Stage 6b with_token)
      - `qianxun/src/daemon/router.rs` (auth_middleware)

      ## 实施 (30 min 严格上限)

      ### 1. 改 `qianxun/src/main.rs` — CLI REPL 分支用 with_token

      现有:
      ```rust
      if cli.daemon_url.is_some() {
          // 走 thin client (用 DaemonClient::new)
      }
      ```

      改成:
      ```rust
      if let Some(ref daemon_url) = cli.daemon_url {
          let client = if let Some(ref token) = cli.client_token {
              DaemonClient::with_token(daemon_url.clone(), token.clone())
          } else {
              DaemonClient::new(daemon_url.clone())
          };
          // 传给 cli::run::run_repl(resolved, project_root, global_instructions, client)
      }
      ```

      ### 2. 改 `qianxun/src/tui/mod.rs` — 走 thin client 时带 token

      找到 TUI 接受 DaemonClient 的位置 (Stage 4 thin client 改造), 加 token 字段:
      ```rust
      pub struct TuiApp {
          daemon_client: Option<DaemonClient>,
          // 启动时按 cli.client_token 构造 DaemonClient::with_token
      }
      ```

      ### 3. 改 `qianxun/src/acp/server.rs` — 同上

      ACP server 接受 client_token 注入.

      ### 4. 单测

      `qianxun/src/main.rs` 末尾 `#[cfg(test)]` (新增) 或在 `qianxun/src/client/mod.rs` 末尾加:
      - `test_daemon_client_with_token_stores_token`: 验证构造带 token
      - `test_daemon_client_new_token_is_none`: 验证 new() 默认 None
      - `test_daemon_url_with_trailing_slash_normalizes`: base_url 带/不带 `/` 都 OK (trim_end_matches)

      ## 关键约束

      - **不接 token 自动刷新** (Stage 7 跟 VPS 集成 login_handler 时再加)
      - **不接 Tauri 自动启动** (Tauri 端走自己的 IPC, 这次只动 Rust binary)
      - **不修改 shared-contract**
      - **不引入新 crate**

      ## 重要 — 30 min 严格上限

      - 不要改 TUI/ACP 内部逻辑 (只改构造 DaemonClient 的那一行)
      - 写完代码 5 分钟前 commit + 写 deliverable.md
    verify_prompt: |
      独立验证.

      ## 必读
      - `qianxun/src/main.rs` (改)
      - `qianxun/src/tui/mod.rs` (改, 1-2 行)
      - `qianxun/src/acp/server.rs` (改, 1-2 行)
      - `deliverable.md`

      ## 验证清单
      - [ ] main.rs CLI REPL 分支检测 cli.daemon_url + cli.client_token, 用 DaemonClient::with_token 或 ::new
      - [ ] tui/mod.rs 走 thin client 时也带 token
      - [ ] acp/server.rs 走 thin client 时也带 token
      - [ ] 3 单测都过 (with_token 存 token / new 存 None / URL 末尾 `/` 归一)
      - [ ] cargo build -p qianxun 通过
      - [ ] 没引入新 crate
      - [ ] 没改 _shared-contract.md
      ## 输出
      verification report (PASS/FAIL).

