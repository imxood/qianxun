          import ProjectAssignPanel from '$lib/components/team/ProjectAssignPanel.svelte';
          import { teamStore } from '$lib/stores/team.svelte';  // 新建
      </script>

      <TeamSwitcher teams={teamStore.teams} activeTeamId={teamStore.activeTeamId}
                    onSelect={(id) => teamStore.activeTeamId = id} />
      {#if teamStore.activeTeam}
          <MemberList team={teamStore.activeTeam} members={teamStore.members} />
          <MemberEditor team={teamStore.activeTeam} members={teamStore.members}
                       onChanged={() => teamStore.refresh()} />
      {/if}
      <ProjectAssignPanel projects={teamStore.projects} members={teamStore.members} />
      ```

