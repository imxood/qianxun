      你的任务: 把 Stage 6b vpsStore 3 方法 (inviteMember/changeRole/assignProject) 从 mock 改为真接 fetch VPS. 改 Sidebar 集成 TeamSwitcher → MemberEditor → ProjectAssignPanel 完整路由.

      ## 必读
