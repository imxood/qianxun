  - id: tauri-stage6a-stronghold
    title: 'Tauri Stage 6a: stronghold 凭据加密 (API key 存到 OS keyring)'
    assigned_to: coder
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      你的任务: 改 Tauri Rust 端 `src-tauri/src/lib.rs` 加 2 个 invoke command: `set_secret` / `get_secret`, 用 tauri-plugin-stronghold 把 API key 等敏感凭据加密存到本地 vault. 改 `qianxun-desktop/src/lib/ipc/bridge.ts` 暴露对应 TypeScript 函数.

      ## 必读
      - `qianxun-desktop/src-tauri/src/lib.rs` (Stage 2 health_check + daemon_health_fetch)
      - `qianxun-desktop/src-tauri/Cargo.toml` (Stage 2 加了 tauri-plugin-shell/http, 没加 stronghold)
      - `qianxun-desktop/src/lib/ipc/bridge.ts` (Stage 2 4 个函数)
      - `docs/30_子项目规划/03-tauri-desktop.md` (§11.3 凭据)

      ## 实施 (30 min 严格上限)

      ### 1. 改 `qianxun-desktop/src-tauri/Cargo.toml` — 加 stronghold

      ```toml
      [dependencies]
      tauri-plugin-stronghold = "2"
      ```

      ### 2. 改 `qianxun-desktop/src-tauri/tauri.conf.json` — 启用 plugin

      `plugins` 字段加 `"stronghold": {}`

      ### 3. 改 `qianxun-desktop/src-tauri/src/lib.rs` — 加 2 个 invoke + plugin 注册

      ```rust
      use tauri::Manager;

      #[tauri::command]
      async fn set_secret(
          app: tauri::AppHandle,
          key: String,
          value: String,
          password: String,
      ) -> Result<(), String> {
          // tauri 2.x: stronghold.create_client (Stage 2 已确认)
          let stronghold = app.stronghold();
          let client = stronghold.create_client("main").map_err(|e| e.to_string())?;
          let store = client.store();
          store.insert(key.as_bytes().to_vec(), value.as_bytes().to_vec(), Some(password.as_bytes().to_vec()))
              .map_err(|e| e.to_string())?;
          client.save().map_err(|e| e.to_string())?;
          Ok(())
      }

      #[tauri::command]
      async fn get_secret(
          app: tauri::AppHandle,
          key: String,
          password: String,
      ) -> Result<Option<String>, String> {
          let stronghold = app.stronghold();
          let client = stronghold.create_client("main").map_err(|e| e.to_string())?;
          let store = client.store();
          match store.get(&key.as_bytes().to_vec(), Some(password.as_bytes().to_vec())) {
              Ok(bytes) => Ok(Some(String::from_utf8_lossy(&bytes).to_string())),
              Err(_) => Ok(None),
          }
      }
      ```

      `tauri::Builder::default().plugin(tauri_plugin_stronghold::Builder::new().build()).invoke_handler(generate_handler![health_check, daemon_health_fetch, set_secret, get_secret])`

      ### 4. 改 `qianxun-desktop/src/lib/ipc/bridge.ts` — 加 2 个函数

      ```typescript
      /// Tauri: 加密存到 stronghold. Web 模式: localStorage 临时存 (Stage 7 加 IndexedDB 加密)
      export async function setSecret(key: string, value: string, password: string): Promise<void> {
          if (!isTauri()) {
              localStorage.setItem(`secret-${key}`, btoa(value));
              localStorage.setItem(`secret-${key}-pwd`, btoa(password));
              return;
          }
          await invoke('set_secret', { key, value, password });
      }

      export async function getSecret(key: string, password: string): Promise<string | null> {
          if (!isTauri()) {
              const v = localStorage.getItem(`secret-${key}`);
              if (!v) return null;
              return atob(v);
          }
          return await invoke<string | null>('get_secret', { key, password });
      }
      ```

      ### 5. 单测

      `qianxun-desktop/src/lib/ipc/bridge.test.ts` (新建, 1 个单测):
      - `test_setSecret_web_mode_uses_localStorage`: 非 Tauri 模式下, setSecret → localStorage 含 base64 value

      ## 关键约束

      - **不接自动密码派生** (用户手动输 password, 留 Stage 7)
      - **不接 key rotation** (留 Stage 7)
      - **不接 secure storage 自动启动** (Tauri 启动时自动 load vault 留 Stage 7)
      - **不引入新前端 crate** (TypeScript 纯逻辑)
      - **不修改 _shared-contract.md**

      ## 重要 — 30 min 严格上限

      - 不要加 2 个以上的 invoke command (set/get 即可)
      - 不要写完整 E2E 测试 (单元即可)
      - 不要做密码 strength check
      - 写完代码 5 分钟前 commit + 写 deliverable.md
