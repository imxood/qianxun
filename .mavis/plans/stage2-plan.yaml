      ## 实施内容 (Stage 2 最小集, 30 分钟内可完成)

      ### 1. 新建 `qianxun/src/daemon/sse.rs` (~150 行)

      定义 SSE 事件序列化辅助:
      ```rust
      use crate::daemon::sse::SseEvent;
      use qianxun_core::provider::LlmStreamEvent;
      use serde::Serialize;

      /// SSE 事件 (与 shared-contract §3.2 严格一致, 12 种类型).
      #[derive(Debug, Clone, Serialize)]
      #[serde(tag = "type")]
      pub enum SseEvent {
          #[serde(rename = "message_start")]
          MessageStart { session_id: String, model: String, max_tokens: u32 },
          #[serde(rename = "content_block_start")]
          ContentBlockStart { index: u32, block_type: String },
          #[serde(rename = "text_delta")]
          TextDelta { index: u32, text: String },
          #[serde(rename = "thinking_delta")]
          ThinkingDelta { index: u32, text: String },
          #[serde(rename = "tool_use_delta")]
          ToolUseDelta { index: u32, id: String, name: String, arguments_json: String },
          #[serde(rename = "tool_use_complete")]
          ToolUseComplete { index: u32, id: String, name: String, arguments: serde_json::Value },
          #[serde(rename = "tool_result")]
          ToolResult { tool_use_id: String, content: String, is_error: bool, elapsed_ms: u64 },
          #[serde(rename = "content_block_stop")]
          ContentBlockStop { index: u32 },
          #[serde(rename = "usage")]
          Usage { input_tokens: u64, output_tokens: u64, cache_creation_input_tokens: u64, cache_read_input_tokens: u64 },
          #[serde(rename = "message_delta")]
          MessageDelta { stop_reason: String },
          #[serde(rename = "message_stop")]
          MessageStop,
          #[serde(rename = "error")]
          Error { code: String, message: String },
      }

      impl SseEvent {
          /// LlmStreamEvent → SseEvent 转换 (核心: 把 LLM 流式事件转成 12 种契约事件).
          pub fn from_llm_event(event: &LlmStreamEvent, block_index: u32) -> Vec<SseEvent> { ... }
      }
      ```

      实现时: `Text` → `TextDelta`, `Thinking` → `ThinkingDelta`, `ToolCall` → `ToolUseDelta` (pre-emit ContentBlockStart) + 后续的 ToolUseComplete 单独 (Stage 2 可选), `UsageUpdate` → `Usage`, `Stop` → `MessageDelta` (带 stop_reason) + 后续 MessageStop.

      ### 2. `qianxun/src/daemon/router.rs` — 改写 `prompt_handler`

      ```rust
      async fn prompt_handler(
          State(state): State<Arc<AppState>>,
          Path(id): Path<String>,
          Json(req): Json<PromptRequest>,    // { messages: [...], model: Option<String> }
      ) -> Result<Sse<impl Stream<Item = Result<Event, Infallible>>>, (StatusCode, String)> {
          // 1. 验证 session 存在
          // 2. 取 session_runtime (Arc<SessionRuntime>)
          // 3. 把 user message 加进 conversation
          // 4. 调 provider.stream_completion(...) → BoxStream<LlmStreamEvent>
          // 5. 在 spawn 任务里: 把 LlmStreamEvent 逐个映射成 SseEvent
          //    (用 SseEvent::from_llm_event), 通过 channel 推给 SSE stream
          // 6. Stream 推完发 message_stop + 完成
          // 7. 客户端断开时 (StreamExt drop) → 自动 abort 任务
      }
      ```

      **关键**: 客户端断开处理用 `tokio::select!` + 监控 channel closed 状态, 不要无限循环.

      ### 3. `qianxun/src/daemon/mod.rs` — AppState 加 `processing_loop_enabled` 字段

      Stage 2 暂不接 `processing_loop::handle_user_message` 全套(避免 30 分钟超), 直接调 `provider.stream_completion` 即可. `processing_loop` 集成留 Stage 3.

