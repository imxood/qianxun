      ### 3. 新建 `qianxun-desktop/src/lib/ipc/bridge.ts` (~80 行)

      ```typescript
      import { invoke } from '@tauri-apps/api/core';
      import { listen, type UnlistenFn } from '@tauri-apps/api/event';
      import type { HealthStatus } from '$lib/types/ipc';

      /// 检查是否在 Tauri 容器内 (Stage 1 直接返回 true, mock 模式).
      export function isTauri(): boolean {
          if (typeof window === 'undefined') return false;
          return '__TAURI_INTERNALS__' in window;
      }

      /// Invoke Tauri command: health_check (本地 mock).
      export async function healthCheck(): Promise<HealthStatus> {
          if (!isTauri()) return mockHealth();
          return await invoke<HealthStatus>('health_check');
      }

      /// Invoke Tauri command: 实际 fetch daemon /v1/system/health.
      export async function fetchDaemonHealth(daemonUrl: string): Promise<HealthStatus> {
          if (!isTauri()) {
              // Web 版 fallback: 浏览器 fetch (受 CORS 限制, 失败时返回 offline)
              try {
                  const r = await fetch(`${daemonUrl}/v1/system/health`, { signal: AbortSignal.timeout(3000) });
                  if (!r.ok) return mockOffline();
                  return { status: 'connected', version: 'web', uptime_sec: 0, session_count: 0, mcp_online: 0 };
              } catch {
                  return mockOffline();
              }
          }
          return await invoke<HealthStatus>('daemon_health_fetch', { url: daemonUrl });
      }

      /// Listen Tauri event: daemon://state-changed.
      export async function onDaemonStateChanged(handler: (state: string) => void): Promise<UnlistenFn> {
          if (!isTauri()) return () => {};
          return await listen<string>('daemon://state-changed', (e) => handler(e.payload));
      }

      function mockHealth(): HealthStatus { return { status: 'offline', version: 'mock', uptime_sec: 0, session_count: 0, mcp_online: 0 }; }
      function mockOffline(): HealthStatus { return { status: 'offline', version: 'unknown', uptime_sec: 0, session_count: 0, mcp_online: 0 }; }
      ```

      ### 4. 改 `qianxun-desktop/src/lib/stores/connection.svelte.ts`

      - 替换 `startHealthCheck()` 内部硬编码的 `fetch` 为 `fetchDaemonHealth(this.daemonUrl)` (通过 bridge.ts)
      - 这样 web 跑也能 fetch, Tauri 跑走 invoke 真实后端

      ### 5. 改 `qianxun-desktop/src/routes/+page.svelte`

      - 加 `+page.svelte` 顶层 `onMount` 里调 `healthCheck()` 验证 IPC 桥接通, console.log 输出
