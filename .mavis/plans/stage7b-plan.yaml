      7. 实际 daemon 启动测试:
         - `cd E:/git/maxu/qianxun && QIANXUN_JWT_SECRET=test ANTHROPIC_AUTH_TOKEN=test ./target/debug/qx --daemon --port 23903 &`
         - 生成测试 token, 跑 8 个 curl 全部返 200/4xx (期望)
         - kill daemon
      8. 验证 deliverable.md 含 sysinfo 评估结论

      ## 输出

      verification report, 末尾 **VERDICT: PASS** 或 **VERDICT: FAIL**.

