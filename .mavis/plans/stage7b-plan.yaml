        - 4 面板各 3 个 (列表渲染 / API 调用 mock / 错误处理)
        - 主题切换 2 个 (toggle 循环 / 持久化)
        - i18n 切换 2 个 (语言切换 / 翻译回退)
        - 共 16
      - 全过
      - `pnpm run check` 0/0
      - `pnpm run build` 成功

      ### B.6 集成

      - vite.config.ts: 跟 7a 一致, 不改
      - 鉴权: 跟 7a 一致 (admin token 存 localStorage)
      - API 客户端: 加 8 个新方法 (跟 7a 同模式)

      ## 不做什么

