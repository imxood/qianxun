  # ────────────────────────────────────────────────────────────
  # Task A: Daemon Rust 端 — Sessions/Config/Memory/System 8 个新 endpoint
  # ────────────────────────────────────────────────────────────
  - id: daemon-stage7b-secondary-endpoints
    title: 'Daemon Rust: 8 个次要 endpoint (list sessions / cancel / pause / put config / delete memory / metrics / logs)'
    assigned_to: coder
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      你的任务: 给 qianxun daemon 加 **Stage 7b** 的 8 个次要管理 endpoint,
      让 Web Console 的 Memory / Sessions / Config / System 4 个面板有数据可看.

      ## 输入资料(必读)

      1. **主规划**: `docs/30_子项目规划/01b-daemon-web-console.md` (§4.2 endpoint 表 §4.2 全部 ☆ 项)
      2. **共享契约**: `docs/30_子项目规划/_shared-contract.md` §3.1.1
      3. **Stage 7a daemon 端代码** (前一个 plan 落地, 已加 `/_ui/*` serve + 8 LLM endpoint + Skills/MCP/Tools endpoint)
      4. **现有代码**:
         - `qianxun/src/daemon/router.rs` (现有 18+ endpoint, JWT auth)
         - `qianxun/src/daemon/agent_host.rs` (AgentLoopHost, session_count / get_session)
         - `qianxun/src/daemon/persistence.rs` (SessionStore, list_active / load_events / delete)
         - `qianxun/src/daemon/session_runtime.rs` (SessionRuntime, last_active)
         - `qianxun-core/src/config.rs` (ResolvedConfig, 含 active_provider)
         - `qianxun-core/src/memory/` (MemoryCore, search / sessions)
         - `qianxun/src/daemon/sse.rs` (SSE 流)
         - `qianxun/src/buf_writer.rs` (日志缓冲)
      5. **CLAUDE.md**: HTTP 客户端 `reqwest` 已用; 新增 crate 需评估传递依赖 (< 30)

      ## 必须落地的改动

      ### A.1 Sessions 管理 (3 个 endpoint)

      ```
      GET    /v1/chat/sessions                            # 列出所有 session (含 status filter: active/paused/all)
      POST   /v1/chat/session/{id}/cancel                 # 取消正在跑的 prompt (SSE 流的 Sender 发 StopReason)
      POST   /v1/chat/session/{id}/pause                  # 暂停 (Stage 7b 留接口, 实现简化为: 标记 paused, 后续再扩展)
      ```

      - `GET /v1/chat/sessions`:
        - query: `?status=active|paused|all` (默认 all)
        - 返 `{sessions: [{id, model, created_at, last_active, message_count, status, token_usage}], total: N}`
        - 从 `SessionStore::list_active()` 拿 meta, 从 `agent_host.session_count()` 拿活跃
      - `POST /v1/chat/session/{id}/cancel`:
        - 调 `agent_host.cancel_session(id)`, 触发 SSE 流的 `StopReason::Cancelled` 事件
        - AgentLoopHost 加 `pub async fn cancel_session(&self, id: &str) -> Result<(), String>` 方法
      - `POST /v1/chat/session/{id}/pause`:
        - 调 `agent_host.pause_session(id)`, 设置 `runtime.paused = true`
        - **Stage 7b 简化**: 标记 paused 后不让新 prompt 进来 (返 409 Conflict), 后续 Stage 7c/8 实现完整 resume 语义
        - AgentLoopHost 加 `pub fn pause_session(&self, id: &str) -> Result<(), String>`

      ### A.2 Config 管理 (1 个 endpoint)

      ```
      PUT    /v1/config                                   # 写 config (覆盖部分字段), 自动 persist
      ```

      - body: 完整 `ResolvedConfig` JSON (可只写部分字段, 缺失的保持不变)
      - 行为:
        1. 校验 JSON 合法 + 必填字段
        2. merge 到现有 `Arc<ResolvedConfig>` (用 `Arc::make_mut` 模式)
        3. 写回 `~/.qianxun/config.json`
        4. 返 `{status: "updated", requires_reload: bool, changed_fields: [...]}`
      - 触发 hot-reload: 监听 `provider` 字段变化, 若变 → 重建 `Arc<dyn LlmProvider>`
      - `requires_reload: true` 表示**当前无法 hot-reload** (如 skills 目录变化), 需用户重启 daemon

      ### A.3 Memory 管理 (2 个 endpoint)

      ```
      DELETE /v1/memory/observations/{id}                 # 删单个观察
      DELETE /v1/memory/sessions/{id}                     # 删整个 memory session
      ```

      - 复用 `qianxun-memory` 的现有 API (查 `qianxun-memory/src/lib.rs` 跟 `db.rs`)
      - 如果 `qianxun-memory` 还没 delete 方法, 加 `pub fn delete_observation(&self, id: &str) -> Result<(), String>` 跟 `pub fn delete_session(&self, id: &str) -> Result<(), String>`

      ### A.4 System 指标 + 日志 (2 个 endpoint)

      ```
      GET    /v1/system/metrics                           # {cpu, mem_mb, conns, uptime_s, sessions: {active, paused, total}}
      GET    /v1/system/logs?lines=N                      # 返最近 N 行日志 (默认 100, 上限 1000)
      ```

      - `/v1/system/metrics`:
        - CPU: **评估 `sysinfo` crate 传递依赖**, 如果 > 30 fallback 到 `std::process::id()` + `psutil`-like 手读 `/proc/self/status` (Linux) / `GetProcessMemoryInfo` (Windows)
        - mem_mb: 用 `sysinfo` (推荐) 或 fallback `std::process::id()` + `ps` 命令
        - conns: 跟踪活跃 SSE 连接数 (用 `Arc<AtomicUsize>`, 在 auth_middleware 进出时 +1/-1)
        - uptime_s: daemon 启动时间戳, 现在 - 启动时间
        - sessions: 调 `agent_host.session_count()` + paused 计数
      - `/v1/system/logs`:
        - 复用 `qianxun/src/buf_writer.rs` 的 ring buffer
        - 加 `pub fn tail(&self, n: usize) -> Vec<String>` 方法
        - 返 `{lines: ["...", "..."], total: N}`
        - 默认 lines=100, 上限 lines=1000

      ### A.5 AppState 扩展

      - `qianxun/src/daemon/mod.rs::AppState`:
        - 加 `pub started_at: Instant` (启动时间戳)
        - 加 `pub active_conns: Arc<AtomicUsize>` (活跃 SSE 连接计数)
        - 现有 `buf_writer` 加 wrapper 或直接 expose
      - `auth_middleware` 进时 `active_conns.fetch_add(1)`, 出时 `fetch_sub(1)` (注意: drop guard)

      ### A.6 测试

      - 至少 14 个新单测:
        - Sessions 3 (list / cancel / pause 各 2-3 case)
        - Config 3 (PUT 合法 / PUT 非法 / hot-reload trigger)
        - Memory 2 (delete observation / delete session)
        - System 4 (metrics 字段存在 / logs 默认 100 行 / logs 上限 1000 / conns counter 准确)
        - 共 12-14 个, 全过
      - 验证: `cargo test -p qianxun --bin qx daemon::` 至少 42 个 pass (28 旧 + 14 新)

      ### A.7 编译 & 警告

      - `cargo build -p qianxun --bin qx` 0 错误
      - 新代码 0 警告
      - sysinfo 评估: 如果决定用, 在 `qianxun/Cargo.toml` 加, 注释 `// 评估通过: 传递依赖 X < 30`; 如果不用, 在 `mod.rs` 注释 `// sysinfo 评估: 传递依赖过大, 用 /proc + Win32 API 手读`

      ## 不做什么

      - **不**做 Admin 密码登录 (Stage 7a 用 token, 7c 再加)
      - **不**做 Chat 视图 (Stage 7c)
      - **不**做 E2E 跑通真 LLM (Stage 8+)
      - **不**做 Web UI 端 (Task B)

      ## 验证清单 (worker 跑完后自己 check)

      ```
      [ ] cargo build -p qianxun --bin qx               0 errors
      [ ] cargo test -p qianqun --bin qx daemon::       ≥ 42 pass
      [ ] curl http://127.0.0.1:23900/v1/chat/sessions -H "Authorization: Bearer <token>" 返 200 + JSON
      [ ] curl -X POST http://127.0.0.1:23900/v1/chat/session/{id}/cancel -H "Authorization: Bearer <token>" 返 200
      [ ] curl -X PUT http://127.0.0.1:23900/v1/config -H "Authorization: Bearer <token>" -d '{"log_level": "debug"}' 返 200
      [ ] curl http://127.0.0.1:23900/v1/system/metrics -H "Authorization: Bearer <token>" 返 200 + 6 字段
      [ ] curl "http://127.0.0.1:23900/v1/system/logs?lines=10" -H "Authorization: Bearer <token>" 返 200
      ```

      ## 关键: 早期写 deliverable.md

      写代码每 5 分钟 commit 一次 git, 超时前 5 分钟必须写 deliverable.md
      (放 `qianxun/src/daemon/deliverable-7b-daemon.md`). deliverable 必须含:
      - 8 个新 endpoint 列表 + curl 验证命令 + 输出样例
      - sysinfo 评估结论 (用 / 不用 / 限制)
      - 已知问题 / TODO 留给 7c
      - "我 commit 了 X 个 commit" 列表

    verify_prompt: |
      独立验证.

      ## 验证步骤

      1. 读 `qianxun/src/daemon/deliverable-7b-daemon.md`
      2. `cd E:/git/maxu/qianxun && cargo build -p qianxun --bin qx` 0 错误
      3. `cd E:/git/maxu/qianxun && cargo test -p qianxun --bin qx daemon::` ≥ 42 pass
      4. grep 验证 8 个新 endpoint 都注册 (list sessions / cancel / pause / put config / 2 delete memory / metrics / logs)
      5. grep 验证 AppState 有 started_at + active_conns 字段
