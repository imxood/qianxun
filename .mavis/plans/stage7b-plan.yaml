      ## 必须落地的改动

      ### B.1 4 个次要面板路由 (src/routes/)

      - `memory/+page.svelte`: Memory 管理
        - 顶部: 搜索框 (调 `/v1/memory/search`)
        - 左栏: session 列表 (调 `/v1/memory/sessions`)
        - 右栏: 选中 session 的观察列表 + 详情 (id / content / tags / created_at / delete 按钮)
        - 删观察: 调 `DELETE /v1/memory/observations/{id}` + 刷新
      - `sessions/+page.svelte`: Chat sessions 管理
        - 顶部: filter (active / paused / all)
        - 列表: session 表格 (id / model / created_at / last_active / message_count / status / token_usage)
        - 行操作: 查看详情 (弹 Dialog 显示完整 event log) / pause / cancel / delete
        - 调: GET /v1/chat/sessions, POST /v1/chat/session/{id}/cancel, POST /v1/chat/session/{id}/pause, DELETE /v1/chat/session/{id}
      - `config/+page.svelte`: Config 管理
        - 表单: 完整 ResolvedConfig 字段 (active_provider / log_level / max_sessions / providers / skills_dirs / 等)
        - 用 zod 校验 (复制 qianxun-desktop 的 schema)
        - 提交: 调 PUT /v1/config, 显示 `requires_reload` 警告
        - 当前只读视图 (read-only) 也行, Stage 7c 再做 edit
      - `system/+page.svelte`: System 状态
        - Dashboard 卡片: CPU / mem_mb / uptime_s / active_conns / sessions {active, paused, total}
        - 折线图: 最近 1 分钟 conns (前端用 svg 手画, 不引 chart 库避免传递依赖)
        - 日志查看: textarea 显示最近 100 行, refresh 按钮 调 /v1/system/logs?lines=100
        - 调: GET /v1/system/metrics + /v1/system/logs

      ### B.2 主题系统 (light/dark/system)

      - `src/lib/stores/theme.ts`:
        - 用 `mode-watcher` 提供的 `setMode` / `mode` (mode-watcher 在 stage 7a 已装)
        - 状态: 'light' | 'dark' | 'system'
        - localStorage 存 `qianxun_theme`, 启动时读
        - `toggleMode()` 在三态间循环
      - `tailwind.config.js`: `darkMode: 'class'` (mode-watcher 自动给 html 加 `class="dark"`)
      - 所有组件用 `dark:` 前缀适配 (e.g. `bg-white dark:bg-zinc-900`)
      - TopBar 加主题切换按钮 (Sun/Moon/Monitor icons from lucide)

      ### B.3 i18n 起步 (zh-CN + en)

      - `src/lib/i18n/index.ts`:
        - 引入 svelte-i18n (stage 7a 已装 devDep)
        - 默认 zh-CN, 可切 en
        - 启动时读 localStorage `qianxun_lang`
      - `src/lib/i18n/zh-CN.json`: 至少 50 个 key (4 旧面板 + 4 新面板的核心 UI 文案)
      - `src/lib/i18n/en.json`: 同 key
      - TopBar 加语言切换按钮 (Languages icon)
      - 关键 UI 文本全用 `{$t('panel.llm.title')}` 包裹 (sidebar, button labels, table headers, ...)

      ### B.4 Sidebar 更新

      - 加 4 个新链接: Memory / Sessions / Config / System
      - 加分隔线: "管理" 区 (LLM/Skills/MCP/Tools) + "运维" 区 (Memory/Sessions/Config/System)
      - 顺序: LLM → Skills → MCP → Tools → --- → Memory → Sessions → Config → System

      ### B.5 测试

