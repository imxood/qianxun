      - `qianxun-core/src/tools/mod.rs` (ToolRegistry)
      - `qianxun-memory/src/lib.rs` (MemoryCore 公开 API)
      - 当前 `qianxun/src/daemon/{mod.rs, agent_host.rs, router.rs}` (要知道现状)

      ## 实施内容 (Stage 1 最小集)

      ### 1. `qianxun/src/daemon/session_runtime.rs` (新建)

      定义 `SessionRuntime` 结构体, 持有 AgentLoop 实际运行所需的所有依赖:

      ```rust
      use std::sync::Arc;
      use qianxun_core::agent::engine::AgentLoop;
      use qianxun_core::agent::conversation::Conversation;
      use qianxun_core::config::ResolvedProviderConfig;
      use qianxun_core::provider::LlmProvider;
      use qianxun_core::tools::ToolRegistry;
      use qianxun_memory::MemoryCore;
      use qianxun_core::skills::SkillManager;

      pub struct SessionRuntime {
          pub session_id: String,
          pub project_root: Option<String>,
          pub config: ResolvedProviderConfig,
          pub agent_loop: AgentLoop,
          pub conversation: Conversation,
          pub provider: Arc<dyn LlmProvider>,
          pub tools: Arc<ToolRegistry>,
          pub memory: Arc<MemoryCore>,
          pub skills: SkillManager,
          pub created_at: chrono::DateTime<chrono::Utc>,
          pub last_active_at: std::sync::RwLock<chrono::DateTime<chrono::Utc>>,
      }
      ```

      > 注: 如果实际 API 签名与上述有差异, 以 qianxun-core 真实 API 为准. AgentLoop 可能没有 `new(config)` 这种简单构造, 看 engine.rs 第 30-100 行附近找构造方法.

      ### 2. `qianxun/src/daemon/agent_host.rs` (改写)

      把现有 `SessionHandle` 替换为 `Arc<SessionRuntime>`, 但**AgentLoop 实际不启动**, 只持有引用:

      ```rust
      pub struct AgentLoopHost {
          sessions: Arc<RwLock<HashMap<SessionId, Arc<SessionRuntime>>>>,
          max_sessions: usize,
      }
      ```

      `create_session` 改为: 实例化 SessionRuntime (provider 来自传入的 `Arc<dyn LlmProvider>`, config 来自 `ResolvedConfig` 等), 插入 HashMap. **不要**调用 `processing_loop` 启动 AgentLoop (Stage 2 才是).

      `delete_session` 保留.

      `reap_stale` 保留.

      ### 3. `qianxun/src/daemon/mod.rs` (小幅调整)

      AppState 加字段 (Stage 1 用最小集):
      ```rust
      pub struct AppState {
          pub agent_host: Arc<AgentLoopHost>,
          pub config: Arc<ResolvedConfig>,
          pub provider: Arc<dyn LlmProvider>,    // 新: 共享 provider 句柄
          pub tools: Arc<ToolRegistry>,         // 新: 共享 tool registry
          pub memory: Arc<MemoryCore>,           // 新: 共享 memory
      }
      ```

      `pub async fn run(port: u16)` 初始化这些共享依赖. 工具/记忆的初始化**可以用空 in-memory**, 真实加载留 Stage 3.

      ### 4. `qianxun/src/daemon/router.rs` (小幅调整)

      `create_session` handler 暂时不接 prompt, 保留 "创建 session" 端点. 验证 AgentLoopHost 真的能 create 一个 SessionRuntime.

      ### 5. 单测

      在 `qianxun/src/daemon/agent_host.rs` 末尾 `#[cfg(test)] mod tests`:
      - `test_create_session_yields_runtime`: create_session 成功, HashMap 里有 1 个 Arc<SessionRuntime>, 字段正确.
      - `test_delete_session_removes_runtime`: create + delete, HashMap 长度为 0.

      ## 关键约束

      - **不修改 shared-contract** (§3 API 契约)
      - **不修改 qianxun-core, qianxun-memory** (除非缺 import 时微调, 标 # TODO)
      - **不接 Tauri/ACP 改造** (Stage 4 才是)
      - **不接 prompt SSE** (Stage 2 才是)
      - **不接 systemd/Service** (后续)
      - **不接 session 持久化** (Stage 3 才是)

      完成后写 `deliverable.md` 包含:
      - 改了哪些文件 (file_path:line_number)
      - SessionRuntime 实际结构 (贴 struct 定义)
      - 1 个单测输出
      - `cargo build -p qianxun` 输出末尾 5 行
      - 已知 TODO (Stage 2-4 还没做的)

      ## 不要做
      - 不要改 TUI/ACP 模块
      - 不要写完整 SSE 流
      - 不要重新设计 API 契约
      - 不要引入新 crate
    verify_prompt: |
      独立验证 worker 的 deliverable, **不要只读 worker 的 diff**.

      ## 必读
      - `docs/30_子项目规划/01-daemon.md` (规划)
      - `docs/30_子项目规划/_shared-contract.md` (契约)
      - `qianxun/src/daemon/{session_runtime.rs, agent_host.rs, mod.rs, router.rs}` (改动)
