      - [ ] `AgentLoopHost.sessions` 是 `HashMap<SessionId, Arc<SessionRuntime>>`
      - [ ] `create_session` 真的实例化 SessionRuntime (不是空 SessionHandle)
      - [ ] `qianxun-memory` crate import 路径正确 (qianxun_memory::MemoryCore)
      - [ ] `qianxun-core` 各模块 import 路径正确
