    assigned_to: coder
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      你的任务: 按 `docs/30_子项目规划/01-daemon.md` 实施 Daemon Stage 1 骨架.
      **重要**: 30 分钟内完成, 只做骨架, 不做完整实施. 目标是 Stage 2 (SSE 流式) 之前的基础.

      ## 必读输入
      - `docs/30_子项目规划/_shared-contract.md` (契约)
      - `docs/30_子项目规划/01-daemon.md` (§2 §3 §4 §5 章节, 不要全读)
