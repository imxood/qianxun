      ## 实施内容 (Stage 1 最小集)

      ### 1. `qianxun/src/server/ws_hub.rs` (新建)

      ```rust
      use axum::extract::ws::Message;
      use std::collections::HashMap;
      use std::sync::Arc;
      use tokio::sync::RwLock;
      use uuid::Uuid;

      /// 连接到 VPS 的客户端类型.
      #[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]
      pub enum ConnectionType {
          /// 来自 dev 机的 daemon
          Device,
          /// 来自 user 的 app (Web / Mobile)
          App,
      }

      /// 单个 WebSocket 连接的元信息.
      pub struct Connection {
          pub id: String,                          // 内部 id
          pub connection_type: ConnectionType,
          /// Device: machine_id; App: user_id
          pub principal_id: String,
          pub tx: tokio::sync::mpsc::UnboundedSender<Message>,
          pub connected_at: chrono::DateTime<chrono::Utc>,
      }

      /// WebSocket Hub — 维护所有活跃连接 + 消息路由.
      pub struct WsHub {
          /// 内部 id → Connection
          connections: Arc<RwLock<HashMap<String, Arc<Connection>>>>,
          /// 索引: device → internal id (一对多, 因为 dev 机可能多 connection)
          by_device: Arc<RwLock<HashMap<String, Vec<String>>>>,
          /// 索引: app user → internal id (一对多, 因为 user 可能多端登录)
          by_user: Arc<RwLock<HashMap<String, Vec<String>>>>,
      }

      impl WsHub {
          pub fn new() -> Self { /* ... */ }

          /// 注册新连接. 返回 connection_id.
          pub async fn register(
              &self, connection_type: ConnectionType,
              principal_id: String, tx: tokio::sync::mpsc::UnboundedSender<Message>,
          ) -> String { /* ... */ }

          /// 注销连接.
          pub async fn unregister(&self, connection_id: &str) { /* ... */ }

          /// 路由消息: 给指定 user 的所有 App 推.
          pub async fn push_to_user(
              &self, user_id: &str, msg: Message,
          ) -> usize { /* returns count of recipients */ }

          /// 路由消息: 给指定 device 推.
          pub async fn push_to_device(
              &self, machine_id: &str, msg: Message,
          ) -> usize { /* returns count of recipients */ }

          /// 当前连接数 (调试用).
          pub async fn stats(&self) -> HubStats { /* ... */ }
      }

      pub struct HubStats {
          pub total: usize,
          pub devices: usize,
          pub apps: usize,
      }
      ```

      ### 2. `qianxun/src/server/messages.rs` (新建)

      定义消息类型 enum (与 shared-contract §3.3 + 02-vps §11.3 对齐, Stage 1 不实现 handler, 只定义 enum):

      ```rust
      use serde::{Deserialize, Serialize};

      /// WebSocket 帧.
      #[derive(Debug, Clone, Serialize, Deserialize)]
      #[serde(tag = "type")]
      pub enum WsFrame {
          // Device → VPS
          #[serde(rename = "auth")]
          Auth { device_token: String, machine_id: String },
          #[serde(rename = "register")]
          Register {
              device_id: String, name: String,
              host_type: String, host_id: String,
              tags: Vec<String>, capabilities: Vec<String>,
              daemon_version: String, os: String,
              cpu_cores: u32, memory_mb: u32,
          },

          // VPS → Device
          #[serde(rename = "auth_ok")]
          AuthOk {
              session_token: String,
              server_time: String,
              server_version: String,
              heartbeat_interval_ms: u32,
          },
          #[serde(rename = "register_ok")]
          RegisterOk { node_id: String },
          #[serde(rename = "register_error")]
          RegisterError { code: String, message: String },

          // App → VPS → Device
          #[serde(rename = "prompt")]
          Prompt {
              request_id: String, session_id: String,
              target_node_id: String, messages: Vec<serde_json::Value>,
              model: String, max_tokens: u32, temperature: f32,
              stream_to_vps: bool, tools_enabled: bool, attachments: Vec<serde_json::Value>,
          },

          // Device → VPS → App
          #[serde(rename = "event")]
          Event { request_id: String, event: serde_json::Value },
          #[serde(rename = "event_done")]
          EventDone { request_id: String, usage: serde_json::Value },
          #[serde(rename = "event_error")]
          EventError { request_id: String, code: String, message: String },

          // Heartbeat
          #[serde(rename = "heartbeat")]
          Heartbeat { ts: i64 },
          #[serde(rename = "heartbeat_ack")]
          HeartbeatAck { ts: i64 },
      }
      ```

      ### 3. `qianxun/src/server/mod.rs` (调整)

      加 WS endpoint 雏形 (不接完整逻辑, 只接受 connection, 立刻 close):

      ```rust
      use axum::extract::ws::{WebSocket, WebSocketUpgrade};

      async fn ws_upgrade(
          ws: WebSocketUpgrade,
      ) -> axum::response::Response {
          ws.on_upgrade(handle_socket)
      }

      async fn handle_socket(mut socket: WebSocket) {
          // Stage 1 雏形: 接受连接, 立刻关闭. Stage 2 接 auth flow.
          let _ = socket.send(axum::extract::ws::Message::Close(None)).await;
      }
      ```

      把 `pub async fn run(port: u16)` 的 axum Router 加上 `ws_hub` 共享 state + `/api/ws` route.

      ### 4. 单测

      `qianxun/src/server/ws_hub.rs` 末尾 `#[cfg(test)] mod tests`:
      - `test_register_and_unregister`: register 1 个 device, stats().devices == 1, unregister 后 == 0
      - `test_push_to_user_routes_to_all_user_connections`: register 2 个 app (同 user), push 1 条消息, 2 个 connection 都收到 (用 mock mpsc::channel)
      - `test_push_to_device_routes_correctly`: register 2 个 device, push 给其中 1 个 machine_id, 只 1 个收到

      ## 关键约束

      - **不接完整 auth / Team / device code** (Stage 2-3 才是)
      - **不修改 shared-contract** (§3.3 字段严格遵守)
      - **不引入新 crate** (用现有 axum / tokio)
      - **不接 axum Router 复杂路由** (Stage 1 只加一个 `/api/ws` 端点)

