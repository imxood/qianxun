  - id: tauri-stage3-sse-consume
    title: 'Tauri Stage 3: SSE 消费 + MessageBubble + InputBox 骨架'
    assigned_to: coder
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      你的任务: 按 `docs/30_子项目规划/03-tauri-desktop.md` 实施 Tauri Stage 3 — SSE 客户端 + MessageBubble + InputBox 骨架.

      ## 必读输入
      - `docs/30_子项目规划/03-tauri-desktop.md` (§7 IPC commands 完整列表, §8 SSE 客户端, §10 离线/降级)
      - `docs/30_子项目规划/_shared-contract.md` (重点 §3.2 SSE 12 个事件 schema)
      - `qianxun-desktop/src/lib/types/ipc.ts` (Stage 1 类型, ContentBlock / Message)
      - `qianxun-desktop/src/lib/stores/connection.svelte.ts` (Stage 1 store)
      - `qianxun-desktop/src/lib/components/layout/ThreeColumnLayout.svelte` (Stage 1, 含 onMount 修)
      - `qianxun-desktop/src/routes/+page.svelte` (Stage 1 mock 数据)
      - `qianxun-desktop/src/lib/ipc/bridge.ts` (Stage 2 invoke wrappers)

      ## 实施内容 (Stage 3 最小集, 30 分钟内)

      ### 1. 新建 `qianxun-desktop/src/lib/sse/client.ts` (~180 行)

      SSE POST 客户端 (EventSource 只支持 GET, 我们需要 POST):
      ```typescript
      import type { ContentBlock, Message, SseEvent, TokenUsage, StopReason } from '$lib/types/ipc';

      export interface SsePromptOptions {
          daemonUrl: string;
          sessionId: string;
          messages: ContentBlock[];
          model?: string;
          maxTokens?: number;
          temperature?: number;
          onEvent: (event: SseEvent) => void;
          signal?: AbortSignal;  // 用户取消
      }

      export class SseError extends Error {
          constructor(public code: 'network'|'parse'|'api'|'cancelled', message: string) { super(message); }
      }

      /// POST /v1/chat/session/:id/prompt, 流式读 SSE 事件.
      /// - 3s → 6s → 12s → 30s 退避重连 (取消时不重连)
      /// - AbortSignal 触发立即停止
      /// - onEvent 回调: 每来一个 SSE 事件触发一次
      export async function streamPrompt(opts: SsePromptOptions): Promise<void>;
      ```

      内部实现:
      - `fetch(daemonUrl + /v1/chat/session/:id/prompt, { method: 'POST', body: JSON.stringify({ messages, model, max_tokens, temperature }), signal })`
      - 读 response.body.getReader(), 解析 SSE 格式 (event: xxx / data: yyy)
      - 每解析到一个完整事件, 调 onEvent 推
      - signal abort 时: reader.cancel() + reject SseError('cancelled')
      - 网络错误: 3-6-12-30s 退避 (但 signal 已 abort 立即退出)

      ### 2. 新建 `qianxun-desktop/src/lib/stores/session.svelte.ts` (~150 行)

      会话状态 + 消息流:
      ```typescript
      import type { ContentBlock, Message, SseEvent } from '$lib/types/ipc';
      import { streamPrompt, SseError } from '$lib/sse/client';
      import { connectionStore } from './connection.svelte';

      interface SessionRuntimeState {
          sessionId: string;
          title: string;
          model: string;
          messages: ContentBlock[];  // 累积
          isStreaming: boolean;
          currentAbort: AbortController | null;
          usage: { input: number; output: number } | null;
      }

      class SessionStore {
          private runtime = $state<SessionRuntimeState | null>(null);

          get messages() { return this.runtime?.messages ?? []; }
          get isStreaming() { return this.runtime?.isStreaming ?? false; }
          get currentAbort() { return this.runtime?.currentAbort ?? null; }

          /// 启动新会话 + 发送 user message
          async send(text: string, model: string): Promise<void> { ... }

          /// 取消当前 streaming
          cancel(): void { ... }

          /// 处理 SSE 事件 (private)
          private handleEvent(event: SseEvent): void { ... }
      }
      export const sessionStore = new SessionStore();
      ```

      `send()` 流程:
      1. 创建 AbortController, 存到 `runtime.currentAbort`
      2. 推 user message 到 `runtime.messages`
      3. `streamPrompt({ ..., signal: abortController.signal, onEvent: e => this.handleEvent(e) })`
      4. handleEvent 区分 12 种类型:
         - `text_delta` → 追加到当前 assistant message 的 text content
         - `tool_use_complete` → 创建 tool_use 块
         - `tool_result` → 创建 tool_result 块
         - `thinking_delta` → 累积到 thinking 块
         - `usage` → 存到 runtime.usage
         - `message_delta` → 设 stop_reason
         - `message_stop` → 清空 currentAbort
         - `error` → 抛出 SseError, 客户端显示
      5. 异常路径: 捕获 SseError, 设 runtime.isStreaming = false, 清 abort

      ### 3. 新建 `qianxun-desktop/src/lib/components/chat/MessageBubble.svelte` (~80 行)

      ```svelte
      <script lang="ts">
          import type { ContentBlock } from '$lib/types/ipc';
          let { block, role }: { block: ContentBlock; role: 'user' | 'assistant' } = $props();
      </script>

      <div class="rounded-lg p-3 my-2 {role === 'user' ? 'bg-blue-50 dark:bg-blue-950 ml-12' : 'bg-muted mr-12'}">
          {#if block.type === 'text'}
              <p class="whitespace-pre-wrap">{block.text}</p>
          {:else if block.type === 'thinking'}
              <details class="text-xs opacity-70">
                  <summary>思考过程</summary>
                  <pre class="whitespace-pre-wrap mt-1">{block.text}</pre>
              </details>
          {:else if block.type === 'tool_use'}
              <div class="border rounded p-2 bg-background">
                  <span class="text-xs font-mono opacity-60">工具调用</span>
                  <code class="block text-sm">{block.toolName}({JSON.stringify(block.input)})</code>
              </div>
          {:else if block.type === 'tool_result'}
              <div class="border rounded p-2 bg-background text-sm">
                  <span class="text-xs font-mono opacity-60">结果</span>
                  <pre class="whitespace-pre-wrap mt-1">{block.content}</pre>
              </div>
          {/if}
      </div>
      ```

      ### 4. 新建 `qianxun-desktop/src/lib/components/chat/InputBox.svelte` (~80 行)

      ```svelte
      <script lang="ts">
          import { sessionStore } from '$lib/stores/session.svelte';
          let { model = 'MiniMax-M3' }: { model?: string } = $props();
          let text = $state('');
          async function submit() {
              if (!text.trim()) return;
              const msg = text; text = '';
              await sessionStore.send(msg, model);
          }
          function onKeydown(e: KeyboardEvent) {
              if (e.key === 'Enter' && !e.shiftKey) {
                  e.preventDefault();
                  submit();
              }
          }
      </script>

      <div class="flex gap-2 p-3 border-t">
          <textarea
              bind:value={text}
              onkeydown={onKeydown}
              placeholder="输入消息, Enter 发送, Shift+Enter 换行"
              disabled={sessionStore.isStreaming}
              class="flex-1 resize-none border rounded p-2 min-h-12 max-h-48"
          ></textarea>
          <button onclick={submit} disabled={!text.trim() || sessionStore.isStreaming} class="px-4 py-2 bg-primary text-primary-foreground rounded">
              {sessionStore.isStreaming ? '生成中...' : '发送'}
          </button>
      </div>
      ```

