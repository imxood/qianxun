  - id: daemon-stage3-persistence
    title: 'Daemon Stage 3: session 持久化 (3 表 schema + 启动恢复)'
    assigned_to: coder
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      你的任务: 按 `docs/30_子项目规划/01-daemon.md` 实施 Daemon Stage 3 — session 持久化到 SQLite.

      ## 必读输入
      - `docs/30_子项目规划/_shared-contract.md` (注意 §3.1 REST endpoints, §6 Project/Session/Team)
      - `docs/30_子项目规划/01-daemon.md` (§6 Session 持久化)
      - `qianxun-core/src/agent/conversation.rs` (Conversation 序列化字段)
      - `qianxun-core/src/agent/engine.rs` (AgentLoop 状态)
      - `qianxun-memory/src/lib.rs` + `qianxun-memory/src/db.rs` (SQLite + FTS5 schema 参考, 注意不要与 qianxun-memory 现有 sessions 表冲突)
      - `qianxun/src/daemon/{mod.rs, agent_host.rs, session_runtime.rs, router.rs, sse.rs}` (Stage 1+2 产出)

      ## 实施内容 (Stage 3 最小集, 30 分钟内)

      ### 1. 新建 `qianxun/src/daemon/persistence.rs` (~250 行)

      3 张新表 schema (与 `qianxun-memory` 的 `sessions` / `observations` 不冲突, 用新表名前缀 `daemon_`):
      ```sql
      -- daemon_sessions: 会话元数据 + 状态机
      CREATE TABLE IF NOT EXISTS daemon_sessions (
          id              TEXT PRIMARY KEY,
          project_root    TEXT,
          config_json     TEXT NOT NULL,    -- ResolvedProviderConfig
          status          TEXT NOT NULL DEFAULT 'active',  -- active | idle | archived
          created_at      TEXT NOT NULL,
          last_active_at  TEXT NOT NULL,
          message_count   INTEGER NOT NULL DEFAULT 0
      );

      -- daemon_conversation_snapshots: 增量 conversation 快照
      CREATE TABLE IF NOT EXISTS daemon_conversation_snapshots (
          session_id      TEXT NOT NULL REFERENCES daemon_sessions(id) ON DELETE CASCADE,
          ordinal         INTEGER NOT NULL,    -- 递增序号
          data_json       TEXT NOT NULL,        -- serde_json::to_string(&conversation)
          created_at      TEXT NOT NULL,
          PRIMARY KEY (session_id, ordinal)
      );

      -- daemon_event_log: 事件流 (transcript)
      CREATE TABLE IF NOT EXISTS daemon_event_log (
          id              INTEGER PRIMARY KEY AUTOINCREMENT,
          session_id      TEXT NOT NULL REFERENCES daemon_sessions(id) ON DELETE CASCADE,
          seq             INTEGER NOT NULL,    -- 会话内事件序号
          event_type      TEXT NOT NULL,        -- 12 种 SSE 事件类型
          event_json      TEXT NOT NULL,
          created_at      TEXT NOT NULL
      );
      CREATE INDEX IF NOT EXISTS idx_event_log_session_seq ON daemon_event_log(session_id, seq);
      ```

      API:
      ```rust
      pub struct SessionStore {
          db: Arc<Mutex<Connection>>,
      }
      impl SessionStore {
          pub fn new(path: &Path) -> Result<Self>;
          /// 创建 session + 写空 snapshot
          pub fn create(&self, id: &str, project_root: Option<&str>, config_json: &str) -> Result<()>;
          /// 增量 snapshot (每 5 个 message 或 60s 一次)
          pub fn save_snapshot(&self, session_id: &str, ordinal: u32, conversation_json: &str) -> Result<()>;
          /// 追加事件 (SSE 流式增量 log)
          pub fn append_event(&self, session_id: &str, seq: u32, event_type: &str, event_json: &str) -> Result<()>;
          /// 列出所有 active session
          pub fn list_active(&self) -> Result<Vec<SessionMeta>>;
          /// 启动恢复: 加载最新 snapshot
          pub fn load_latest_snapshot(&self, session_id: &str) -> Result<Option<(u32, String)>>;
          /// 启动恢复: 加载事件流
          pub fn load_events(&self, session_id: &str, from_seq: u32) -> Result<Vec<EventEntry>>;
      }
      pub struct SessionMeta { pub id: String, pub project_root: Option<String>, pub status: String, pub created_at: String, pub last_active_at: String, pub message_count: u32 }
      pub struct EventEntry { pub seq: u32, pub event_type: String, pub event_json: String }
      ```

      ### 2. 改 `qianxun/src/daemon/agent_host.rs`

      - `create_session` 末尾调 `self.store.create(&id, project_root, &config_json)`
      - 启动时 `reap_stale` 之前, 调 `self.restore_from_disk()`:
        - 遍历 `store.list_active()` 的所有 session
        - 对每个 session, 调 `store.load_latest_snapshot()` 拿到 conversation_json
        - 反序列化, 装进 `Arc<SessionRuntime>` (注意: 不调 AgentLoop, 只装 conversation 状态)
      - 新增 `pub store: Arc<SessionStore>` 字段

      ### 3. 改 `qianxun/src/daemon/sse.rs` / `router.rs::prompt_handler`

      - 在 `prompt_handler` 的 provider.stream_completion 调用前后, 把每个 LlmStreamEvent 通过 `store.append_event()` 落盘
      - **Stage 3 简化**: 每 5 个 message 写一次 snapshot, 60s 写一次 (Stage 4 优化增量)

      ### 4. 改 `qianxun/src/daemon/mod.rs`

      - AppState 加 `pub store: Arc<SessionStore>` 字段
      - `pub async fn run(port: u16, config: ResolvedConfig)` 初始化 SessionStore (默认路径: `~/.qianxun/daemon.db`)
      - 初始化顺序: provider → tools → memory → store → AgentLoopHost (store 要在 host 之前)

      ### 5. 单测 `qianxun/src/daemon/persistence.rs` 末尾

      - `test_create_and_list_session`: create 3 个, list_active 长度 = 3
      - `test_save_and_load_snapshot`: save 2 个 snapshot, load_latest_snapshot 返回 ordinal=2 那个
      - `test_append_and_load_events`: append 5 个 event, load_events 拿全部, 序对
      - `test_session_delete_cascades`: 删 session, snapshots + events 也都没了

      ## 关键约束

      - **3 张新表都加 `daemon_` 前缀**, 不与 `qianxun-memory` 的 `sessions`/`observations` 冲突
      - **不接 SQLite 加密** (Stage 4 才是)
      - **不接 compaction / 压缩** (后续)
      - **不接 VPS 同步** (Stage 4 才是)
      - **不引入新 crate** (rusqlite 已经在 qianxun/Cargo.toml)
      - **不修改 shared-contract**

      完成后写 `deliverable.md`:
      - 改了哪些文件
      - 3 张表完整 DDL
      - SessionStore 7 个方法签名
      - 4 个单测输出
      - `cargo build -p qianxun` 通过
      - `cargo test -p qianxun --bin qx daemon::` 通过
      - 已知 TODO (Stage 4: 增量 snapshot + VPS 同步)
