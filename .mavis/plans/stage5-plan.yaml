  - id: tauri-stage5-bundle-theme-teamui
    title: 'Tauri Stage 5: 生产打包 + 主题切换 + SQLite 缓存 + Team 管理 UI'
    assigned_to: coder
    verified_by: verifier
    timeout_ms: 7200000
    prompt: |
      你的任务: 按 `docs/30_子项目规划/03-tauri-desktop.md` 实施 Tauri Stage 5 — 生产打包 (adapter-static + tauri build) + 主题切换 + SQLite 缓存 + 完整 Team 管理 UI.

      ## 必读输入
      - `docs/30_子项目规划/03-tauri-desktop.md` (§9 Team UI, §11 主题/缓存, §12 生产打包)
      - `docs/30_子项目规划/_shared-contract.md`
      - `qianxun-desktop/src/lib/{stores, components, i18n}` (Stage 1-4 产出)
      - `qianxun-desktop/src-tauri/{tauri.conf.json, src/lib.rs}` (Stage 2 产出)
      - `qianxun-desktop/svelte.config.js` (Stage 1)

      ## 实施内容 (Stage 5 最小集, 30 分钟内)

      ### 1. 改 `qianxun-desktop/svelte.config.js` — 改 adapter-static

      ```js
      import adapter from '@sveltejs/adapter-static';
      // 替换 adapter-auto
      export default {
          kit: { adapter: adapter({ fallback: 'index.html', precompress: false }) }
      };
      ```
      pnpm install 加 @sveltejs/adapter-static

      ### 2. 新建 `qianxun-desktop/src/lib/stores/settings.svelte.ts` (~80 行)

      Settings store (持久化到 localStorage):
      ```typescript
      class SettingsStore {
          theme = $state<'light' | 'dark' | 'system'>('system');
          locale = $state<'zh-CN' | 'en'>('zh-CN');
          daemonUrl = $state<string>('http://127.0.0.1:23900');
          vpsUrl = $state<string>('');

          // 自动持久化
          $effect.root(() => {
              $effect(() => {
                  localStorage.setItem('qianxun-settings', JSON.stringify({
                      theme: this.theme,
                      locale: this.locale,
                      daemonUrl: this.daemonUrl,
                      vpsUrl: this.vpsUrl,
                  }));
              });
          });
      }
      ```

      ### 3. 改 `qianxun-desktop/src/lib/stores/connection.svelte.ts` — 集成主题

      - daemonState 4 态颜色用主题变量 (light/dark 切换)
      - 顶栏状态点用 CSS 变量 `var(--state-color)` (不是硬编码 bg-red-500)

      ### 4. 新建 `qianxun-desktop/src/lib/db/sqlite.ts` (~100 行)

      SQLite 缓存层 (用 `tauri-plugin-sql` 走 IndexedDB fallback):
      ```typescript
      import { isTauri } from '$lib/ipc/bridge';

      /// 项目列表缓存 (Tauri: SQLite, web: localStorage)
      export async function cacheProjects(projects: Project[]): Promise<void>;
      export async function getCachedProjects(): Promise<Project[] | null>;

      /// 会话列表缓存
      export async function cacheSessions(sessions: Session[]): Promise<void>;
      export async function getCachedSessions(projectId: string): Promise<Session[] | null>;
      ```

      web 模式用 localStorage (tauri-plugin-sql 没 native). Tauri 模式 (检测 isTauri()) 用 IndexedDB via `idb-keyval` 库.

      ### 5. 新建 `qianxun-desktop/src/lib/components/team/TeamSwitcher.svelte` (~60 行)

      团队切换器 (左栏顶部):
      ```svelte
      <script lang="ts">
          import type { Team } from '$lib/types/ipc';
          let { teams, activeTeamId, onSelect }: { ... } = $props();
      </script>
      <select value={activeTeamId} onchange={(e) => onSelect(e.currentTarget.value)} class="...">
          {#each teams as team}
              <option value={team.id}>{team.name} ({team.members.length} 成员)</option>
          {/each}
      </select>
      ```

      ### 6. 新建 `qianxun-desktop/src/lib/components/team/MemberList.svelte` (~80 行)

      成员列表 (中栏底部 or 模态):
      - 显示所有成员头像 + 名字 + 角色
      - 管理员可编辑角色 (Stage 5 简化: 只读)

      ### 7. 改 `qianxun-desktop/src/lib/components/layout/Sidebar.svelte`

      - 顶部加 `<TeamSwitcher>`
      - 底部加 `<MemberList>` (折叠)
      - 选团队时更新 activeTeamId (走 store)

      ### 8. 改 `qianxun-desktop/src-tauri/tauri.conf.json`

      - bundle.targets: ["appimage", "deb", "rpm", "nsis", "msi", "app", "dmg"] (Stage 5 全平台)
      - bundle.icon 加 32x32.png + 128x128.png + 256x256.png + 512x512.png (Stage 5 多分辨率)
      - 加 `app.windows[0].minWidth: 800, minHeight: 600`

      ### 9. 单测

      - settings.svelte.ts: 1 测试 — 改 theme 后 localStorage 含新值
      - sqlite.ts: 1 测试 — web 模式 cache/get 往返
      - TeamSwitcher: 1 测试 — onSelect 回调触发

      ## 关键约束

      - **生产打包配置改好, 但不实际 `pnpm tauri build`** (太慢且需图标资源)
      - **主题切换**: 起步 light/dark/system, 实际渲染靠 CSS 变量 (不用 mode-watcher 强监听系统, 让用户选)
      - **SQLite 缓存** in Tauri 模式用 IndexedDB (idb-keyval 库), web 模式用 localStorage
      - **Team UI** 只做基础 CRUD (读 + 切换 + 列表), 写操作 (加成员/改角色/分配项目) 留 Stage 6
      - **不接 VPS WS 完整 team 消息路由** (Stage 6 才是, 这次只读 vpsStore 状态)
      - **不接 Tauri stronghold 凭据加密** (Stage 6 才是)
      - **不接国际化扩** (Stage 5 维持 10 个 key)
      - **不修改 _shared-contract.md**

      完成后写 `deliverable.md`:
      - 改了哪些文件
      - adapter-static 配置
      - SettingsStore 4 字段 + 持久化
      - sqlite.ts Tauri vs web 分支
      - TeamSwitcher / MemberList 实际渲染
      - tauri.conf.json 多平台 targets + 多分辨率 icon
      - 3 单测输出
      - pnpm run check 0/0
      - pnpm run build 成功
      - 已知 TODO (Stage 6: 凭据加密 + 写操作 UI + VPS WS 路由)

      **关键**: 早期写 deliverable.md, 防止 timeout 后丢失.
