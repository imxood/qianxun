tasks:
  - id: daemon-stage5-reconnect-auth-service
    title: 'Daemon Stage 5: 自动重连 + token auth + systemd/Windows Service'
    assigned_to: coder
    verified_by: verifier
    timeout_ms: 7200000
    prompt: |
      你的任务: 按 `docs/30_子项目规划/01-daemon.md` 实施 Daemon Stage 5 — 客户端自动重连 + token auth + systemd/Windows Service 注册.

      ## 必读输入
      - `docs/30_子项目规划/_shared-contract.md` (§3.1 REST)
      - `docs/30_子项目规划/01-daemon.md` (§11 systemd / §13 迁移阶段 4)
      - `qianxun/src/client/mod.rs` (Stage 4 DaemonClient)
      - `qianxun/src/main.rs` (clap 入口 + --standalone / --daemon-url)
      - `qianxun/src/daemon/{mod.rs, router.rs}` (Stage 1-4 产出)
      - `qianxun/Cargo.toml`

      ## 实施内容 (Stage 5 最小集, 30 分钟内)

      ### 1. 改 `qianxun/src/client/mod.rs` — 自动重连

      ```rust
      impl DaemonClient {
          /// 自动重连: 3s → 6s → 12s → 30s 退避, 上限 30s.
          /// - 健康检查: 每次 health() 失败累计 attempt++, 成功重置
          /// - 重连触发: 后台 task 用 tokio::time::interval 跑 health, failed 时退避
          /// - event 订阅: onStateChange callback (offline/reconnecting/connected)
          pub fn start_reconnect_loop(&mut self, on_state: impl Fn(ReconnectState) + Send + 'static);
      }

      pub enum ReconnectState {
          Connected,
          Reconnecting { attempt: u32, next_retry_in: Duration },
          Offline { last_error: String },
      }
      ```

      ### 2. 改 `qianxun/src/daemon/router.rs` — token auth

      加 `X-Api-Key` 或 `Authorization: Bearer <key>` middleware:
      ```rust
      /// Stage 5: 简单 token 校验 (生产应换 JWT + 过期检查).
      /// 接受: env var QIANXUN_API_KEY (与 provider API key 区分, 这是 daemon 自己的).
      /// 拒绝: 401 Unauthorized
      pub async fn auth_middleware(
          headers: axum::http::HeaderMap,
          request: axum::extract::Request,
          next: axum::middleware::Next,
      ) -> Result<axum::response::Response, axum::http::StatusCode>;
      ```

      应用到 /v1/chat/session 和 /v1/chat/session/:id/prompt 之外的 **写操作 endpoint** (POST/DELETE).
      /v1/system/health 跳过 (k8s probe 用).

      ### 3. 新建 `qianxun/src/daemon/service.rs` (~50 行)

      systemd / Windows Service 注册代码 (Stage 5 简化: 只写设计 + 单元文件示例, 不实际注册):
      ```rust
      /// 输出 systemd unit file 内容.
      pub fn systemd_unit_template() -> &'static str;

      /// 输出 Windows Service 注册 PowerShell 脚本.
      pub fn windows_service_install_script() -> &'static str;
      ```

      ### 4. 写 systemd unit file 示例 `qianxun/daemon.service`

      ```ini
      [Unit]
      Description=Qianxun Daemon
      After=network.target

      [Service]
      Type=simple
      User=qianxun
      ExecStart=/usr/local/bin/qx --daemon --port 23900
      Restart=on-failure
      RestartSec=5
      Environment=QIANXUN_API_KEY=

      [Install]
      WantedBy=multi-user.target
      ```

      ### 5. 单测

      - `qianxun/src/client/mod.rs` 加 1 测试: mock 503 失败 3 次后, attempt==3, next_retry_in==30s
      - `qianxun/src/daemon/router.rs` 加 1 测试: 缺 X-Api-Key → 401, 有 → 200

      ## 关键约束

      - **token auth 简化**: 单 key 校验, 不用 JWT(Stage 6 再加)
      - **systemd/Windows Service 不实际注册** (开发机注册会污染), 只产出配置文件
      - **不接 Tauri 客户端集成** (Tauri 自己有 IPC, 客户端 token 留 Stage 6)
      - **不引入新 crate** (tokio + reqwest + axum 已有)
      - **不修改 shared-contract** (§3.1 不变)

      完成后写 `deliverable.md`:
      - 改了哪些文件
      - start_reconnect_loop 退避表
      - auth_middleware 跳过/不跳过的 endpoint
      - daemon.service unit 内容
      - 2 单测输出
      - `cargo build -p qianxun` 通过
      - 已知 TODO (Stage 6: JWT + 客户端 token + Windows Service 实注册)

      **关键**: 早期写 deliverable.md, 防止 30 min timeout 后丢失.
    verify_prompt: |
      独立验证.

      ## 必读
      - `docs/30_子项目规划/01-daemon.md` (§11)
      - `docs/30_子项目规划/_shared-contract.md`
      - `qianxun/src/client/mod.rs` (改)
      - `qianxun/src/daemon/{router.rs, service.rs}` (改/建)
      - `qianxun/daemon.service` (新建)
      - `deliverable.md`

      ## 验证清单
      - [ ] start_reconnect_loop 退避 3-6-12-30s + attempt 上限
      - [ ] Reconnecting state 含 next_retry_in
      - [ ] auth_middleware 拒绝 401, 接受带 X-Api-Key
      - [ ] /v1/system/health 跳过 auth (k8s probe)
      - [ ] daemon.service 是合法 systemd unit
      - [ ] service.rs 2 个函数返回非空字符串
      - [ ] 2 单测都过
      - [ ] cargo build -p qianxun 通过
      - [ ] 没引入新 crate
      - [ ] 没改 _shared-contract.md
      ## 输出
      verification report (PASS/FAIL).

  - id: vps-stage5-ratelimit-outbox-webui
    title: 'VPS Server Stage 5: rate-limit + outbox + Web UI 起步 (index.html + 登录页)'
    assigned_to: coder
    verified_by: verifier
    timeout_ms: 7200000
    prompt: |
      你的任务: 按 `docs/30_子项目规划/02-vps-server.md` 实施 VPS Server Stage 5 — rate-limit + outbox + Web UI 起步 (静态 HTML 登录页).

      ## 必读输入
      - `docs/30_子项目规划/02-vps-server.md` (§10 命令中转 rate-limit, §11.4 扩展清单, §12 部署)
      - `docs/30_子项目规划/_shared-contract.md`
      - `qianxun/src/server/{mod.rs, ws_hub.rs, messages.rs, team_db.rs, auth.rs, admin.rs}` (Stage 1-4 产出)

      ## 实施内容 (Stage 5 最小集, 30 分钟内)

      ### 1. 新建 `qianxun/src/server/rate_limit.rs` (~80 行)

      Token bucket rate-limit per user:
      ```rust
      /// 用户级 token bucket, 每分钟 60 token, burst 10.
      pub struct RateLimiter {
          buckets: Arc<RwLock<HashMap<String, Bucket>>>,
      }
      impl RateLimiter {
          pub fn new() -> Self;
          /// 检查 user_id 是否允许发送, 允许则扣 token 返回 Ok, 否则返 Err(TooMany).
          pub fn check(&self, user_id: &str) -> Result<(), RateError>;
      }
      pub enum RateError { TooMany }
      ```

      ### 2. 改 `qianxun/src/server/mod.rs` — 在 handle_prompt_frame 加 rate-limit

      ```rust
      // 1. 验证 RBAC
      // 2. 检查 rate limit, 失败 → 推 event_error code="rate_limit"
      // 3. 推 prompt 给 target_node
      // 4. 把消息入 outbox (Stage 5 简化: HashMap<request_id, ...>)
      ```

      ### 3. 新建 `qianxun/src/server/outbox.rs` (~60 行)

      ```rust
      /// 消息 outbox: 节点离线时缓冲, 重连后 replay.
      pub struct Outbox {
          // Stage 5 简化: in-memory HashMap<node_id, Vec<PendingEvent>>
          // Stage 6 换 SQLite 持久化
      }
      impl Outbox {
          pub fn new() -> Self;
          pub fn enqueue(&self, node_id: &str, event: serde_json::Value);
          /// 当节点重连, 返回该节点所有未送达的事件.
          pub fn drain(&self, node_id: &str) -> Vec<serde_json::Value>;
      }
      ```

      ### 4. 新建 `qianxun/src/server/static_ui/` — 静态 Web UI 起步

      文件:
      - `qianxun/src/server/static_ui/index.html` (~80 行):
        * 登录页: 邮箱 + 密码 → POST /api/auth/login
        * 简单 inline CSS (深色 + 千寻品牌色)
        * 不用 JS 框架 (Stage 5 简化)
      - `qianxun/src/server/static_ui/login.js` (~30 行): fetch 调用

      ### 5. 改 `qianxun/src/server/mod.rs` — mount 静态资源

      ```rust
      .nest_service("/ui", axum::serve_static::ServeDir::new("src/server/static_ui"))
      ```

      ### 6. 单测

      - `qianxun/src/server/rate_limit.rs` 末尾 1 测试: 连续 70 次 check, 第 11-70 次返 Err(TooMany)
      - `qianxun/src/server/outbox.rs` 末尾 1 测试: enqueue 3 个, drain 拿全部

      ## 关键约束

      - **Web UI 起步, 不用任何 JS 框架** (vanilla JS, 简化起步)
      - **rate-limit in-memory** (per-process, 不跨节点. Stage 6 改 Redis)
      - **outbox in-memory** (Stage 5 简化, Stage 6 持久化)
      - **不接完整 Web UI (聊天 / 团队 / 项目管理)** (Stage 6 才是, 现在的 Tauri 桌面 + 未来 web 是两套不同界面)
      - **不引入新 crate** (axum / tokio 已有)
      - **不修改 shared-contract**

      完成后写 `deliverable.md`:
      - 改了哪些文件
      - RateLimiter 配置 (60/min, burst 10)
      - handle_prompt_frame 完整流程 (RBAC → rate-limit → 推 prompt → outbox)
      - outbox enqueue/drain 实现
      - static_ui/index.html 实际渲染
      - 2 单测输出
      - `cargo build -p qianxun` 通过
      - 已知 TODO (Stage 6: rate-limit Redis 化 + outbox 持久化 + 完整 Web UI)
    verify_prompt: |
      独立验证.

      ## 必读
      - `docs/30_子项目规划/02-vps-server.md` (§10 §12)
      - `qianxun/src/server/{rate_limit.rs, outbox.rs}` (新建)
      - `qianxun/src/server/mod.rs` (改)
