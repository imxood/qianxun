      - `qianxun-desktop/src/lib/types/ipc.ts` (Project / TeamMember 类型)

      ## 实施 (30 min 严格上限)

      ### 1. 新建 `qianxun-desktop/src/lib/components/team/MemberEditor.svelte` (~120 行)

      加成员 / 改角色 UI:
      ```svelte
      <script lang="ts">
          import type { TeamMember, Team } from '$lib/types/ipc';
          import { setSecret, getSecret } from '$lib/ipc/bridge';
          import { vpsStore } from '$lib/stores/vps.svelte';
          import { settingsStore } from '$lib/stores/settings.svelte';

          let { team, members, onChanged }: {
              team: Team;
              members: TeamMember[];
              onChanged: () => void;
          } = $props();

          let adding = $state(false);
          let newUserId = $state('');
          let newRole = $state<'member' | 'admin'>('member');

          async function add() {
              // 调 vpsStore.inviteMember(team.id, newUserId, newRole)
              // (vpsStore 还没 inviteMember, 本次新增)
              await vpsStore.inviteMember(team.id, newUserId, newRole);
              adding = false;
              onChanged();
          }
      </script>

      <div>
          {#each members as m}
              <div class="flex items-center gap-2 py-1">
                  <span>{m.displayName}</span>
                  <select value={m.role} onchange={...} class="text-xs">
                      <option value="owner">owner</option>
                      <option value="admin">admin</option>
                      <option value="member">member</option>
                  </select>
              </div>
          {/each}
          <button onclick={() => adding = true}>+ 加成员</button>
          {#if adding}
              <input bind:value={newUserId} placeholder="user_id" />
              <select bind:value={newRole}>...</select>
              <button onclick={add}>确认</button>
          {/if}
      </div>
      ```

      ### 2. 改 `qianxun-desktop/src/lib/stores/vps.svelte.ts` — 加 3 方法

      ```typescript
      class VpsStore {
          /// 调 VPS REST: POST /api/teams/:id/members { user_id, role }
          async inviteMember(teamId: string, userId: string, role: string): Promise<void>;

          /// 调 VPS REST: PATCH /api/teams/:id/members/:user_id { role }
          async changeRole(teamId: string, userId: string, role: string): Promise<void>;

          /// 调 VPS REST: POST /api/projects/:id/assign { user_id }
          async assignProject(projectId: string, userId: string): Promise<void>;
      }
      ```

      这 3 方法都 fetch VPS base URL, 带 Authorization Bearer header (从 stronghold 取 vpsToken).
      **Stage 6b 简化**: 不真调, 只 mock (返回 Ok, UI 看到调用成功). Stage 6c 才接真 fetch.

      ### 3. 改 `qianxun-desktop/src/lib/stores/settings.svelte.ts` — 启动时从 stronghold 读 vpsToken

