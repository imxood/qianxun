      ```

      实际 Stage 6b 简化: 跳过 stronghold 读, 直接读 `localStorage.getItem('vps-token')`. Stage 7 加密码弹窗.

      ### 4. 改 `qianxun-desktop/src/lib/components/team/ProjectAssignPanel.svelte` (~80 行, 新建)

